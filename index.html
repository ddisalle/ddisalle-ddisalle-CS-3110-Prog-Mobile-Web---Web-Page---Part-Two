<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Web Page App Part Two - AJAX</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header>
    <h1>Web Page App Part Two</h1>
    <p>AJAX demo using GET, POST, PUT, DELETE.</p>
  </header>

  <main>
    <section class="card">
      <h2>Items (AJAX GET)</h2>
      <button type="button" id="refreshBtn">Refresh List</button>
      <p id="statusText"></p>
      <ul id="itemsList"></ul>
    </section>

    <section class="card">
      <h2>Create Item (AJAX POST)</h2>
      <form id="createForm">
        <label for="newName">Item Name</label><br>
        <input id="newName" name="name" placeholder="Example: Lamp">
        <br>
        <button type="submit">Create Item</button>
      </form>
      <p id="createMsg"></p>
    </section>

    <section class="card">
      <h2>Response Output</h2>
      <pre id="output">{}</pre>
    </section>
  </main>

  <script>
    const itemsList = document.getElementById("itemsList");
    const output = document.getElementById("output");
    const statusText = document.getElementById("statusText");
    const createMsg = document.getElementById("createMsg");

    document.getElementById("refreshBtn").addEventListener("click", loadItems);
    document.getElementById("createForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      await createItem();
    });

    // 1) AJAX GET: Load items on page load
    window.addEventListener("DOMContentLoaded", loadItems);

    async function loadItems() {
      statusText.textContent = "Loading items...";
      itemsList.innerHTML = "";

      try {
        const res = await fetch("/api/items");
        const data = await res.json();

        output.textContent = JSON.stringify(data, null, 2);

        if (!data.items || data.items.length === 0) {
          statusText.textContent = "No items yet. Create one below!";
          return;
        }

        statusText.textContent = `Loaded ${data.items.length} item(s).`;
        renderItems(data.items);
      } catch (err) {
        statusText.textContent = "Failed to load items.";
        output.textContent = JSON.stringify({ error: String(err) }, null, 2);
      }
    }

    // DOM manipulation: render list with Edit + Delete controls per it>
    function renderItems(items) {
      for (const item of items) {
        const li = document.createElement("li");
        li.style.marginBottom = "12px";

        const title = document.createElement("span");
        title.textContent = `#${item.id}: ${item.name} `;
        title.style.fontWeight = "bold";

        // Edit input
        const editInput = document.createElement("input");
        editInput.value = item.name;
        editInput.style.marginLeft = "10px";
        editInput.style.maxWidth = "260px";

        // PUT button
        const saveBtn = document.createElement("button");
        saveBtn.type = "button";
        saveBtn.textContent = "Save (AJAX PUT)";
        saveBtn.style.marginLeft = "10px";
        saveBtn.addEventListener("click", async () => {
          await updateItem(item.id, editInput.value);
        });

        // DELETE button
        const delBtn = document.createElement("button");
        delBtn.type = "button";
        delBtn.textContent = "Delete (AJAX DELETE)";
        delBtn.style.marginLeft = "10px";
        delBtn.addEventListener("click", async () => {
          await deleteItem(item.id);
        });

        li.appendChild(title);
        li.appendChild(editInput);
        li.appendChild(saveBtn);
        li.appendChild(delBtn);

        itemsList.appendChild(li);
      }
    }

    // 2) AJAX POST: Create item
    async function createItem() {
      const name = document.getElementById("newName").value.trim();
      createMsg.textContent = "";

      try {
        const res = await fetch("/api/items", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name })
        });

        const data = await res.json();
        output.textContent = JSON.stringify(data, null, 2);

        if (!res.ok) {
          createMsg.textContent = `Error: ${data.error || "Request failed"}`;
          return;
        }

        document.getElementById("newName").value = "";
        createMsg.textContent = "Item created!";
        await loadItems(); // refresh DOM so change is visible
      } catch (err) {
        createMsg.textContent = "Error creating item.";
        output.textContent = JSON.stringify({ error: String(err) }, null, 2);
      }
    }

    // 3) AJAX PUT: Update item
    async function updateItem(id, newName) {
      const name = String(newName || "").trim();
      if (!name) {
        output.textContent = JSON.stringify({ error: "Name cannot be empty." }, null, 2);
        return;
      }

      try {
        const res = await fetch("/api/items", {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ id, name })
        });

        const data = await res.json();
        output.textContent = JSON.stringify(data, null, 2);

        if (!res.ok) return;

        await loadItems(); // refresh DOM so change is visible
      } catch (err) {
        output.textContent = JSON.stringify({ error: String(err) }, null, 2);
      }
    }

    // 4) AJAX DELETE: Delete item
    async function deleteItem(id) {
      try {
        const res = await fetch("/api/items", {
          method: "DELETE",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ id })
        });

        const data = await res.json();
        output.textContent = JSON.stringify(data, null, 2);

        if (!res.ok) return;

        await loadItems(); // refresh DOM so change is visible
      } catch (err) {
        output.textContent = JSON.stringify({ error: String(err) }, null, 2);
      }
    }
  </script>
</body>
</html>
